# Usuario bajo el cual corre el proceso worker de Nginx (por defecto en alpine es 'nginx')
user nginx;

# 'auto' detectará automáticamente la cantidad de núcleos de CPU de tu máquina (o asignados al contenedor)
# y levantará un proceso por cada uno, maximizando el paralelismo real.
worker_processes auto;

# Archivo de logs para capturar fallos globales del sistema de red
error_log /var/log/nginx/error.log notice;
pid       /var/run/nginx.pid;

events {
    # Cantidad de conexiones simultáneas que puede manejar CADA worker process.
    # Con 'auto' en CPUs modernas, tu proxy podrá procesar miles de peticiones concurrentes sin despeinarse.
    worker_connections 1024;
}

http {
    # Optimizaciones nativas del sistema operativo para transferencia de archivos binarios rápidos
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Mapeos de tipos MIME básicos (CSS, JS, JSON)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # FORMATO DE LOGS: Configurado para auditoría. Nos permite ver qué método (GET/POST) 
    # y hacia qué upstream interno se redirigió la petición del cliente.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" -> Upstream: $upstream_addr';
    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # DEFINICIÓN DE UPSTREAMS (Los balances de carga/red hacia tus microservicios de Go)
    # -------------------------------------------------------------------------
    
    # WRITE MODEL: Procesa los Comandos (Creación de feeds)
    upstream feeds_POST {
        server feed:8080;
    }

    # READ MODEL: Resuelve las Consultas de listados tradicionales
    upstream feeds_GET {
        server query:8080;
    }

    # READ MODEL BÚSQUEDAS: Resuelve las búsquedas full-text contra Elasticsearch
    upstream search_GET {
        server query:8080;
    }

    # TIME REAL BUS: Gestiona las conexiones de WebSockets bidireccionales
    upstream pusher {
        server pusher:8080;
    }

    # -------------------------------------------------------------------------
    # CONFIGURACIÓN DEL SERVIDOR PROXY HTTP
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # Cabeceras de Red Estándar para que Go conozca la IP real del cliente original
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forzar el uso de HTTP/1.1 para la comunicación interna con tus contenedores Go.
        # Esto permite mantener sockets Keep-Alive abiertos con el backend, reduciendo la latencia.
        proxy_http_version 1.1;

        # Configuración Global de CORS (Permite que Frontends en React/Vue/Angular consuman la API)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        # ---------------------------------------------------------------------
        # ENDPOINT: /feeds (El Corazón del Enrutamiento CQRS)
        # ---------------------------------------------------------------------
        location /feeds {
            # Protección de métodos: Bloquea intentos de DELETE, PUT, etc.
            limit_except GET POST OPTIONS {
                deny all;
            }

            # Si el cliente envía un OPTIONS (Preflight de CORS en navegadores), respondemos 204 de inmediato
            if ($request_method = OPTIONS) {
                return 204;
            }

            # MAGIA CQRS: Si es POST, viaja a feeds_POST. Si es GET, viaja a feeds_GET.
            proxy_pass http://feeds_$request_method;
        }

        # ---------------------------------------------------------------------
        # ENDPOINT: /search (Consultas Full-Text en Elasticsearch)
        # ---------------------------------------------------------------------
        location /search {
            limit_except GET OPTIONS {
                deny all;
            }

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://search_GET;
        }

        # ---------------------------------------------------------------------
        # ENDPOINT: /ws (Conexión Persistente WebSockets en Tiempo Real)
        # ---------------------------------------------------------------------
        location /ws {
            # Cabeceras obligatorias del protocolo para el "Handshake" (Apretón de manos) de HTTP a WS
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # MEJORA CRÍTICA: Desactiva el buffering de Nginx. 
            # Si se deja encendido, Nginx acumulará los bytes enviados por el pusher-service 
            # en un búfer intermedio antes de mandarlos a la web, matando el tiempo real.
            proxy_buffering off;

            # MEJORA CRÍTICA: Eleva los tiempos de espera de lectura y escritura a 7 días.
            # Por defecto Nginx corta a los 60 segundos; esto evita que tus usuarios 
            # se desconecten constantemente del chat/feed por inactividad en la red.
            proxy_read_timeout 7d;
            proxy_send_timeout 7d;

            proxy_pass http://pusher;
        }
    }
}

#Este archivo es el API Gateway y la columna vertebral pública de tu sistema CQRS. Usar la variable $request_method (proxy_pass http://feeds_$request_method;) para dividir dinámicamente el tráfico entrante de /feeds es una genialidad: los POST van directo al microservicio de escritura (feed-service) y los GET van al modelo de lecturas optimizado (query-service). Es la viva representación de la segregación de responsabilidades de CQRS en la capa de red.